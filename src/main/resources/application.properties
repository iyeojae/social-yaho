spring.application.name=social-yaho

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/klit_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

app.recommendation.feed-cache-ttl-seconds=${APP_RECOMMENDATION_FEED_CACHE_TTL_SECONDS:900}
app.book-import.path=${APP_BOOK_IMPORT_PATH:md_books}
app.book-import.xlsx-path=${APP_BOOK_IMPORT_XLSX_PATH:TRANSLATEDBOOKS_20260702032206.xlsx}

spring.sql.init.mode=never

